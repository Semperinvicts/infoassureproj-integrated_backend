<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CSCN08C</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg:       #0c1a09;
      --surface:  #162612;
      --border:   rgba(163, 204, 140, 0.15);
      --green:    #3d6b35;
      --green-md: #6fa35a;
      --green-lt: #a8cc8c;
      --text:     #e8f0e4;
      --muted:    rgba(232, 240, 228, 0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px;
      border-bottom: 1px solid var(--border);
    }

    .topbar-brand {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green-lt);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .user-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-md);
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-logout:hover {
      border-color: rgba(163, 204, 140, 0.4);
      color: var(--text);
    }

    /* Transitional loading state shown before the OAuth token is exchanged */
    .loading-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      animation: rise 0.4s ease 0.1s forwards;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--green-md);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 48px 72px;
      gap: 52px;
    }

    .vault-header {
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .vault-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--green-md);
      margin-bottom: 10px;
    }

    .vault-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .vault-sub {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .eyes-section {
      display: flex;
      gap: 40px;
      opacity: 0;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }

    .eye-outer {
      width: 120px;
      height: 64px;
      background: #f5f5f0;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 1.5px rgba(163, 204, 140, 0.25);
    }

    .iris-wrap {
      position: absolute;
      width: 38px;
      height: 38px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .iris {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #6fa35a 0%, #3d6b35 45%, #1e3a18 100%);
      position: relative;
    }

    .pupil {
      position: absolute;
      width: 17px;
      height: 17px;
      background: #080d07;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .section-rule {
      width: 100%;
      max-width: 760px;
      height: 1px;
      background: var(--border);
      opacity: 0;
      animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    .video-wrap {
      width: 100%;
      max-width: 760px;
      opacity: 0;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .video-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .topbar { padding: 18px 24px; }
      .main   { padding: 40px 24px 56px; gap: 36px; }
      .eye-outer { width: 90px; height: 48px; }
      .iris-wrap { width: 28px; height: 28px; }
      .pupil { width: 12px; height: 12px; }
    }
  </style>
</head>
<!--
    FIX: Unquoted data attributes — same reasoning as private.html.
    {{name}} and {{email}} use escapeHtml(); attributes are always double-quoted.
-->
<body id="mainBody" class="dashboard-mode" data-user-name="{{name}}" data-user-email="{{email}}">

  <header class="topbar">
    <span class="topbar-brand">CSCN08C</span>
    <div class="topbar-right">
      <div class="user-chip">
        <span class="user-dot"></span>
        <span id="dashUser">{{email}}</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main class="main" id="mainContent" style="display:none">

    <div class="vault-header">
      <p class="vault-eyebrow">Access granted</p>
      <h1 class="vault-title">Welcome to the Vault</h1>
      <p class="vault-sub">You've passed all security checks.</p>
    </div>

    <div class="eyes-section" id="eyesSection">
      <div class="eye-outer">
        <div class="iris-wrap" id="irisL">
          <div class="iris"><div class="pupil"></div></div>
        </div>
      </div>
      <div class="eye-outer">
        <div class="iris-wrap" id="irisR">
          <div class="iris"><div class="pupil"></div></div>
        </div>
      </div>
    </div>

    <div class="section-rule"></div>

    <div class="video-wrap">
      <p class="video-label">Your reward</p>
      <div class="video-frame">
        <iframe
          id="ytFrame"
          src="https://www.youtube-nocookie.com/embed/-S3eJswGN0k?rel=0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

  </main>

  <!-- Shown while the OAuth token exchange is in progress -->
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <p class="loading-text">Completing sign-in…</p>
  </div>

  <script src="callback-handler.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
