<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CSCN08C</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- FIX: inline styles moved to dashboard.css (removes CSP unsafe-inline) -->
  <link rel="stylesheet" href="dashboard.css">
</head>
<!--
    FIX: Unquoted data attributes
    ────────────────────────────────────────────────────────────────────────────
    BEFORE: data-user-name={{js_name}}  ← unquoted; JSON.stringify adds "..."
            but a name containing " (e.g. O'Brien or Jo "Smith") breaks
            the HTML attribute boundary.

    AFTER:  data-user-name="{{name}}"   ← always double-quoted in HTML;
            {{name}} is replaced by escapeHtml() which converts " → &quot;
            so attribute syntax is never broken regardless of user input.
            dataset.userName in dashboard.js receives the decoded value
            automatically (HTML entities are decoded on .dataset access).
-->
<body id="mainBody" class="dashboard-mode" data-user-name="{{name}}" data-user-email="{{email}}">

  <header class="topbar">
    <span class="topbar-brand">CSCN08C</span>
    <div class="topbar-right">
      <div class="user-chip">
        <span class="user-dot"></span>
        <span id="dashUser">{{email}}</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main class="main">

    <div class="vault-header">
      <p class="vault-eyebrow">Access granted</p>
      <h1 class="vault-title">Welcome to the Vault</h1>
      <p class="vault-sub">You've passed all security checks.</p>
    </div>

    <div class="eyes-section" id="eyesSection">
      <div class="eye-outer">
        <div class="iris-wrap" id="irisL">
          <div class="iris"><div class="pupil"></div></div>
        </div>
      </div>
      <div class="eye-outer">
        <div class="iris-wrap" id="irisR">
          <div class="iris"><div class="pupil"></div></div>
        </div>
      </div>
    </div>

    <div class="section-rule"></div>

  <div class="video-wrap">
        <p class="video-label">Your reward</p>
        <div class="video-frame">
          <img 
            src="/reward.jpg" 
            alt="Access Granted Reward" 
            style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border: none;"
          >
        </div>
      </div>

  </main>

  <script src="script.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
